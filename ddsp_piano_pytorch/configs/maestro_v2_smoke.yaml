model:
  n_synths: 16
  n_harmonics: 24
  n_noise_bands: 17
  sample_rate: 8000
  frame_rate: 100
  context_dim: 32
training:
  manifest: maestro_train_manifest.csv
  batch_size: 1
  learning_rate: 1.0e-3
  num_workers: 0
  duration: 1.0
  epochs: 1
  phase1_epochs: 1
  phase2_epochs: 0
  grad_clip: 1.0
  fft_sizes: [512, 256, 128]
  fft_overlap: 0.75
  inharmonicity_weight: 1.0
  reverb_weight: 0.001
  reverb_loss_type: L1
  checkpoint_dir: checkpoints/maestro_v2_smoke
  log_dir: runs/maestro_v2_smoke
  log_every: 1
