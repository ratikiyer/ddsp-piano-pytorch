model:
  n_synths: 16
  n_harmonics: 96
  n_noise_bands: 65
  sample_rate: 24000
  frame_rate: 250
  context_dim: 128
  z_encoder:
    class: OneHotZEncoder
    n_instruments: 10
    z_dim: 16
    n_inharm_params: 1
    n_detuning_params: 1
  context_network:
    class: FiLMContextNetwork
    layer_dim: 512
    context_dim: 128
  reverb_model:
    class: MultiInstrumentFeedbackDelayReverb
    fdn_n_delays: 8
    early_ir_length: 200
  monophonic_network:
    class: MonophonicDeepNetwork
    rnn_channels: 512
    ch: 128
training:
  manifest: maestro_train_manifest.csv
  batch_size: 4
  learning_rate: 3.0e-4
  num_workers: 4
  duration: 3.0
  epochs: 20
  phase1_epochs: 10
  phase2_epochs: 10
  grad_clip: 1.0
  fft_sizes: [2048, 1024, 512, 256]
  fft_overlap: 0.75
  inharmonicity_weight: 10.0
  reverb_weight: 0.01
  reverb_loss_type: L1
  checkpoint_dir: checkpoints/maestro_v2
  log_dir: runs/maestro_v2
  log_every: 20
